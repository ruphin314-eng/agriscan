spring.application.name=sa-backend

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

server.port=${PORT:8080}

# Mailjet API
mailjet.api.key=${MAILJET_API_KEY}
mailjet.api.secret=${MAILJET_SECRET_KEY}
mailjet.sender.email=agriscantech@gmail.com
mailjet.sender.name=Agriscan

# ?? Upload ?????????????????????????????????????????????????
upload.dir=uploads/photos
server.base-url=https://agriscan-backend-04bd.onrender.com

# Taille max fichier upload (5 Mo)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

#analyse d'image
crophealth.api.key=${CROPHEALTH_API_KEY}

